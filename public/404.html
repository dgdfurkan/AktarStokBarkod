<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Aktar Pro - Redirecting...</title>
    <script type="text/javascript">
        // GitHub Pages için 404 Yönlendirme Scripti
        // Bu script, bir alt sayfaya gidildiğinde 404 alan tarayıcıyı index.html'e yönlendirir
        // ve orijinal yolu (path) bir sorgu parametresi olarak taşır.
        var pathSegmentsToKeep = 1;

        var l = window.location;
        l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
        );
    </script>
</head>

<body>
</body>

</html>
